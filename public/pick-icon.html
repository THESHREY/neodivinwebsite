<!DOCTYPE html>
<html>
<head>
<title>Pick Your Icon</title>
<style>
body { background: #3D2B1F; display: flex; flex-wrap: wrap; gap: 24px; padding: 40px; justify-content: center; font-family: Arial, sans-serif; }
h1 { width: 100%; text-align: center; color: #C8A951; font-size: 24px; }
.card { background: rgba(255,248,240,0.06); border: 2px solid rgba(200,169,81,0.2); border-radius: 16px; padding: 24px; text-align: center; width: 200px; transition: all 0.3s; cursor: pointer; }
.card:hover { border-color: #E07C24; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(224,124,36,0.2); }
.card img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 12px; }
.card h3 { color: #C8A951; font-size: 16px; margin: 8px 0 4px; }
.card p { color: rgba(255,248,240,0.5); font-size: 12px; }
</style>
</head>
<body>

<div class="card"><img src="/images/icon-options/opt5.png"><h3>Option 5</h3><p>Jain Mark</p></div>
<div class="card"><img src="/images/icon-options/opt6.png"><h3>Option 6</h3><p>Lotus</p></div>
<div class="card"><img src="/images/icon-options/opt7.png"><h3>Option 7</h3><p>Sacred Hand</p></div>
<div class="card"><img src="/images/icon-options/opt8.png"><h3>Option 8</h3><p>Spiritual</p></div>
</body>
</html>
